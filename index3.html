<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8" />
     <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     <link rel="icon" type="image/png" href="bday.png" />
     <title>happy birthday Jasmine</title>
     <link rel="icon" href="https://i.ibb.co.com/hXZsYxZ/heart.png">
     <style>
          * {
               box-sizing: border-box;
               margin: 0;
               padding: 0;
          }

          body {
               background-color: #f0f0ff;
               color: #6a5acd;
               font-family: 'Poppins', sans-serif;
               overflow: auto;
          }

          .page {
               min-height: 100vh;
               height: auto;
               width: 100vw;
               position: absolute;
               top: 0;
               left: 0;
               display: flex;
               flex-direction: column;
               justify-content: center;
               align-items: center;
               text-align: center;
               padding: 20px;
               opacity: 0;
               pointer-events: none;
               transition: opacity 1s ease;
          }

          .page.active {
               opacity: 1;
               pointer-events: auto;
          }

          h1 {
               font-size: 2.2rem;
               margin-bottom: 1rem;
          }

          h2 {
               font-size: 1.8rem;
               margin-bottom: 1rem;
          }

          .highlight {
               color: #8a2be2;
               font-weight: bold;
          }

          .button {
               background-color: #9370db;
               color: #fff;
               border: none;
               border-radius: 25px;
               padding: 15px 30px;
               font-size: 1.2rem;
               cursor: pointer;
               margin-top: 30px;
               transition: background 0.3s;
          }

          .button:hover {
               background-color: #8a2be2;
          }

          img {
               max-width: 70vw;
               max-height: 50vh;
               margin-bottom: 20px;
          }

          .letter {
               white-space: pre-line;
               font-size: 1.1rem;
               max-width: 600px;
               text-align: left;
               border-left: 3px solid #9370db;
               padding-left: 15px;
               min-height: 200px;
          }

          .falling {
               position: fixed;
               top: -30px;
               font-size: 24px;
               animation: fall linear infinite;
               pointer-events: none;
               z-index: 9999;
          }

          .pink-heart {
               color: #9370db;
          }

          .yellow-star {
               color: #dda0dd;
          }

          .music-control {
               position: fixed;
               bottom: 20px;
               right: 20px;
               font-size: 30px;
               cursor: pointer;
               z-index: 9999;
          }

          @keyframes fall {
               to {
                    transform: translateY(120vh) rotate(360deg);
                    opacity: 0;
               }
          }

          @media (max-width: 600px) {
               h1 {
                    font-size: 1.8rem;
               }

               h2 {
                    font-size: 1.5rem;
               }

               .button {
                    padding: 10px 20px;
                    font-size: 1rem;
               }

               .letter {
                    font-size: 1rem;
               }
          }
     </style>
</head>

<body>
     <div class="page active" id="page1">
          <img src="https://i.ibb.co/39x3FQVV/content-1.gif" alt="Cute Icon" />
          <h1>Happy Birthday <span class="highlight"> Jasmine!</span></h1>
          <p>anh có một món quà muốn tặng em ✨</p>
          <button class="button" onclick="goToPage(2)">ấn vào đây nhé ‹𝟹</button>
     </div>

     <div class="page" id="page2">
          <img src="https://i.ibb.co/v6SqyynR/1.gif" alt="Envelope" />
          <p>Ting ting em có thư đến .. mở thư đi nè! ( ∩´͈ ᐜ `͈∩)</p>
          <button class="button" onclick="goToPage(3)">mở thư ‹𝟹</button>
     </div>

     <div class="page" id="page3" style="font-family: 'Dancing Script', cursive;">
          <h2>Dear Jasmine, <𝟑 .ᐟ </h2>
                    <div class="letter" id="letterText"></div>
     </div>

     <audio id="bg-music" src="Beauty And A Beat.mp3" autoplay loop muted></audio>
     <audio id="click-sound"
          src="https://public.youware.com/users-website-assets/prod/50390417-3924-48fa-b7cc-21adb627e36e/256113_3263906-lq.mp3"
          preload="auto"></audio>
     <div class="music-control" id="musicControl">🔇</div>

     <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
     <script>
          const fullLetter = `Chúc em tuổi mới luôn rực rỡ như nắng ban mai, dịu dàng như cơn gió đầu ngày và hạnh phúc theo cách riêng của mình.

Mong rằng tuổi mới sẽ mang đến cho em thật nhiều niềm vui, những bất ngờ nhỏ bé nhưng đủ khiến tim em mỉm cười, và cả những người luôn chân thành ở cạnh bên.

Hy vọng những ngày phía trước của em sẽ luôn ngập tràn tiếng cười, những ước mong rồi sẽ lần lượt hóa thành hiện thực. Những khi mỏi mệt sẽ có một bờ vai để tựa vào, còn những nỗi buồn thì nhẹ như cơn mưa ngang qua rồi tan mất giữa trời chiều. Vì em xứng đáng với tất cả những điều dịu dàng nhất trên thế gian này.

Cảm ơn em vì đã khiến những ngày rất đỗi bình thường bỗng trở nên vui hơn theo một cách thật tự nhiên. Mong em sẽ luôn giữ được sự dịu dàng trong tâm hồn, ánh mắt đầy hy vọng và nụ cười đẹp như nắng đầu mùa để mỗi chặng đường em đi qua đều phủ đầy những tháng ngày thật trong trẻo và bình yên. 🌼🌷`;

          // Play click sound function
          function playClickSound() {
               const clickSound = document.getElementById('click-sound');
               clickSound.currentTime = 0;
               clickSound.play().catch(e => console.log("Audio play failed:", e));
          }

          // Add click sound to all buttons and clickable elements
          document.addEventListener('DOMContentLoaded', function () {
               const clickableElements = document.querySelectorAll('button, .music-control');
               clickableElements.forEach(element => {
                    element.addEventListener('click', playClickSound);
               });
          });

          function goToPage(pageNum) {
               const pages = document.querySelectorAll('.page');
               pages.forEach(p => p.classList.remove('active'));
               const next = document.getElementById(`page${pageNum}`);
               next.classList.add('active');

               if (pageNum === 3) {
                    const music = document.getElementById("bg-music");
                    music.currentTime = 24.5;
                    music.muted = false;
                    music.play().catch(e => console.log("Autoplay blocked:", e));
                    document.getElementById("musicControl").textContent = "🔊";

                    confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } });
                    typeText(fullLetter, document.getElementById('letterText'), 25);
                    startFallingSymbols();
               }
          }

          function typeText(text, element, speed) {
               element.innerHTML = '';
               let i = 0;
               function type() {
                    if (i < text.length) {
                         element.innerHTML += text.charAt(i);
                         i++;
                         setTimeout(type, speed);
                    }
               }
               type();
          }

          function startFallingSymbols() {
               setInterval(() => {
                    const el = document.createElement('div');
                    el.classList.add('falling');
                    const isHeart = Math.random() < 0.5;
                    el.innerText = isHeart ? '💕' : '⭐';
                    el.classList.add(isHeart ? 'pink-heart' : 'yellow-star');
                    el.style.left = Math.random() * 100 + 'vw';
                    el.style.animationDuration = (3 + Math.random() * 2) + 's';
                    document.body.appendChild(el);
                    setTimeout(() => el.remove(), 6000);
               }, 300);
          }

          // Music control
          const musicControl = document.getElementById("musicControl");
          const bgMusic = document.getElementById("bg-music");
          let isMuted = true;

          musicControl.addEventListener("click", function () {
               if (isMuted) {
                    bgMusic.muted = false;
                    bgMusic.play().catch(e => console.log("Autoplay blocked:", e));
                    musicControl.textContent = "🔊";
                    isMuted = false;
               } else {
                    bgMusic.muted = true;
                    musicControl.textContent = "🔇";
                    isMuted = true;
               }
          });
     </script>
</body>

</html>
